<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MetalHub Cluster Console</title>
    <script src="/static/tailwind.js"></script>
    <script src="/static/lucide.js"></script>
    <script src="/static/marked.js"></script>
    <style>
        /* 代码块容器 */
        .markdown-body pre { position: relative; padding-top: 2.5rem; }
        /* 复制按钮 */
        .copy-btn {
            position: absolute; top: 0.5rem; right: 0.5rem;
            padding: 0.25rem 0.5rem; font-size: 10px;
            background: #334155; color: #cbd5e1; border-radius: 4px;
            border: 1px solid #475569; cursor: pointer; transition: all 0.2s;
        }
        .copy-btn:hover { background: #475569; color: #fff; }
        /* 警示语样式 */
        .code-warning { font-size: 10px; color: #94a3b8; padding: 0.5rem 1rem; background: #1e293b; border-top: 1px solid #334155; font-style: italic; }

        /* Markdown 样式微调 */
        .markdown-body pre { background: #0f172a; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; border: 1px solid #1e293b; margin: 0.5rem 0; }
        .markdown-body code { font-family: 'JetBrains Mono', monospace; color: #93c5fd; font-size: 0.85rem; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .markdown-body h1, .markdown-body h2 { color: #60a5fa; font-weight: bold; margin-top: 1rem; }
    </style>
    <style>
        @keyframes slideInRight {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        #monitor-list > div {
            animation: slideInRight 0.3s ease-out;
        }

        .history-item .lucide-trash-2:hover {
            color: #ef4444 !important; /* 鲜艳的红色 */
            transform: scale(1.1);
        }
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .chat-container { height: calc(100vh - 200px); overflow-y: auto; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .node-active { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #1d4ed8; } }
    </style>
    
</head>
<body class="flex h-screen overflow-hidden">

    <!-- 左侧状态边栏 -->
    <aside class="w-80 bg-slate-900 border-r border-slate-800 flex flex-col hidden lg:flex">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tighter">
                METALHUB <span class="text-xs italic font-light text-slate-500">v0.3.0</span>
            </h1>
        </div>
        
        <div class="p-6 flex-1 space-y-6 overflow-y-auto">
            <div>
                <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Engine Status</label>
                <div id="status-badge" class="mt-2 flex items-center gap-2 text-emerald-400 bg-emerald-400/5 px-3 py-2 rounded-lg border border-emerald-500/20">
                    <i data-lucide="activity" class="h-3 w-3"></i>
                    <span id="status-text" class="text-xs font-bold uppercase">Ready</span>
                </div>
            </div>

            <div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700/50">
                <label class="text-[10px] text-slate-500 uppercase">Active Profile</label>
                <div class="text-sm font-bold mt-1 text-blue-400 flex items-center gap-2">
                    <i data-lucide="layers" class="h-4 w-4"></i> 
                    <span id="active-profile-name">{{ profile }}</span>
                </div>
            </div>

            <div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700/50">
                <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Model Selector</label>
                <select id="model-select" class="w-full mt-2 bg-slate-900 text-xs border border-slate-700 rounded p-2 text-blue-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                    <option value="">正在加载模型列表...</option>
                </select>
                <p class="text-[9px] text-slate-600 mt-2 italic"><i data-lucide="info" class="inline h-2 w-2"></i> 切换将触发模型接力</p>
            </div>

            <!-- 在左侧边栏 Model Selector 下方增加会话列表区域 -->
            <div class="flex-1 flex flex-col min-h-0">
                <div class="px-6 py-4 flex justify-between items-center border-t border-slate-800">
                    <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">History</label>
                    <button onclick="createNewChat()" class="text-blue-400 hover:text-blue-300 transition">
                        <i data-lucide="plus-circle" class="h-4 w-4"></i>
                    </button>
                </div>
                <div id="history-list" class="flex-1 overflow-y-auto px-4 space-y-1 pb-4">
                    <!-- 历史会话项将动态加载到这里 -->
                </div>
            </div>

            <style>
                /* 文字平滑淡入动画 */
                .token-fade { animation: fadeIn 0.2s ease-out forwards; }
                @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }
                
                /* 会话项激活样式 */
                .history-item.active { background-color: #1e293b; border-color: #3b82f6; color: #60a5fa; }
                .history-item { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
                .history-item:hover { background-color: #1e293b; }
            </style>
             <!-- Live API Monitor Panel -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest flex items-center gap-2">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span>
                        Live API Traffic
                    </label>
                    <span id="total-tokens-served" class="text-[9px] font-mono text-slate-500 bg-slate-800 px-1.5 py-0.5 rounded">0 TOKENS</span>
                </div>
                <div id="monitor-list" class="space-y-2 max-h-48 overflow-y-auto pr-2">
                    <p class="text-[10px] text-slate-700 italic px-2">无活跃外部请求...</p>
                </div>
            </div>
            <div>
                <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Cluster Distribution</label>
                <div id="nodes-container" class="mt-2 space-y-3">
                    <p class="text-[10px] text-slate-600 italic">等待任务分配负载...</p>
                </div>
            </div>
        </div>
        
        <div class="p-6 text-[10px] text-slate-600 border-t border-slate-800">
            <i data-lucide="network" class="h-3 w-3 inline mr-1"></i> Distributed Engine Active
        </div>
    </aside>

    <!-- 右侧主界面 -->
    <main class="flex-1 flex flex-col relative bg-slate-950">
        <header class="h-16 border-b border-slate-800/50 flex items-center justify-between px-8 bg-slate-900/30 backdrop-blur-xl z-10">
            <div class="flex gap-6 items-center">
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 uppercase">TPS</span>
                    <span id="metric-tps" class="text-sm font-mono text-blue-400 font-black">-- t/s</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 uppercase">Processing</span>
                    <span id="metric-pp" class="text-sm font-mono text-emerald-400 font-black">-- ms</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 uppercase">Loaded Model</span>
                    <span id="metric-model" class="text-[10px] font-mono text-slate-400 font-bold truncate max-w-[150px]">None</span>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-500 hover:text-red-400 transition-colors"><i data-lucide="rotate-ccw" class="h-4 w-4"></i></button>
        </header>

        <div id="chat" class="chat-container p-8 space-y-8">
            <div class="text-center mt-20 opacity-20">
                <i data-lucide="bot" class="h-16 w-16 mx-auto mb-4"></i>
                <p class="text-xl font-black italic text-blue-400">METALHUB ENGINE</p>
                <p class="text-sm">M1 Max 64GB Unified Memory Relay</p>
            </div>
        </div>

        <div class="p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
            <div class="max-w-4xl mx-auto relative">
                <!-- 在 textarea 所在 div 内部 -->
                <div class="absolute left-3 bottom-3 flex gap-2">
                    <button onclick="copyToClipboard(document.getElementById('input').value, this)" class="text-slate-500 hover:text-slate-300 text-[10px] uppercase font-bold">复制输入</button>
                </div>
                <div class="relative bg-slate-900 border border-slate-700/50 rounded-2xl shadow-2xl overflow-hidden focus-within:border-blue-500/50">
                    <textarea id="input" rows="1" oninput="autoResize(this)" 
                        class="w-full bg-transparent pt-4 pb-4 pl-6 pr-36 focus:outline-none resize-none text-sm text-slate-200" 
                        placeholder="输入剧本片段或绘图指令..."></textarea>
                    <div class="absolute right-3 bottom-3 flex gap-2">
                        <button onclick="send('chat')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-xs font-black transition flex items-center gap-2">
                            <i data-lucide="zap" class="h-3 w-3"></i> CHAT
                        </button>
                        <button onclick="send('image')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-black transition flex items-center gap-2">
                            <i data-lucide="image" class="h-3 w-3"></i> DRAW
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. 基础变量与初始化 ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            // 检查 marked 是否加载成功
            if (typeof marked === 'undefined') {
                console.error("Marked 库加载失败，请检查网络或路径");
            }

            marked.setOptions({
                breaks: true,   // 关键：保留换行符
                gfm: true,      // 开启 GitHub 风格
                headerIds: false,
                mangle: false
            });
        });

        // 初始化监控连接
        function initMonitor() {
            const eventSource = new EventSource('/v1/system/monitor/stream');
            const list = document.getElementById('monitor-list');
            const totalLabel = document.getElementById('total-tokens-served');

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.total) totalLabel.innerText = data.total.toLocaleString() + ' TOKENS';

                if (data.type === 'INIT') {
                    list.innerHTML = data.tasks.length ? '' : '<p class="text-[10px] text-slate-700 italic px-2">等待 API 流量...</p>';
                    data.tasks.forEach(task => updateTaskUI(task));
                } else if (data.type === 'UPDATE') {
                    updateTaskUI(data.task);
                }
            };
        }

        function updateTaskUI(task) {
            const list = document.getElementById('monitor-list');
            let taskEl = document.getElementById(`monitor-task-${task.id}`);
            
            if (list.querySelector('p')) list.innerHTML = '';

            // --- 1. 处理请求来源标签与颜色 ---
            const isLocal = (task.ip === '127.0.0.1' || task.ip === 'localhost');
            const sourceLabel = isLocal ? 'INTERNAL' : task.ip;
            const sourceColor = isLocal ? 'text-blue-400 bg-blue-500/10' : 'text-purple-400 bg-purple-500/10';
            const sourceIcon = isLocal ? 'monitor' : 'globe'; // 本地显示屏幕，外部显示地球
            
            // --- 2. 处理任务状态与类型图标 ---
            const statusColor = task.status === 'RUNNING' ? 'text-amber-400 animate-pulse' : 'text-emerald-500';
            const typeIcon = task.type === 'VISION' ? 'eye' : 'message-square';
            
            // --- 3. 构造 HTML ---
            const html = `
                <div class="flex flex-col bg-slate-800/40 border-l-2 ${task.status === 'RUNNING' ? 'border-amber-500' : 'border-emerald-500'} p-2 rounded-r-lg mb-2 transition-all duration-500">
                    <div class="flex justify-between items-start mb-1">
                        <!-- 模型名称与类型 -->
                        <span class="text-[9px] font-bold text-slate-300 flex items-center gap-1">
                            <i data-lucide="${typeIcon}" class="w-3 h-3"></i> 
                            ${task.model.length > 15 ? task.model.substring(0, 15) + '...' : task.model}
                        </span>
                        <!-- 来源图标标签 (动态更新点) -->
                        <span class="text-[8px] px-1.5 py-0.5 rounded font-mono ${sourceColor} flex items-center gap-1">
                            <i data-lucide="${sourceIcon}" class="w-2 h-2"></i> ${sourceLabel}
                        </span>
                    </div>
                    <div class="flex justify-between items-center text-[8px] uppercase tracking-tighter">
                        <span class="${statusColor} font-black">${task.status}</span>
                        <span class="text-slate-500">
                            ${task.status === 'COMPLETED' ? `<b class="text-slate-300">${task.tps} t/s</b> | ${task.tokens} tokens` : task.start_time}
                        </span>
                    </div>
                </div>
            `;

            // --- 4. 插入或更新 DOM ---
            if (!taskEl) {
                taskEl = document.createElement('div');
                taskEl.id = `monitor-task-${task.id}`;
                list.prepend(taskEl); // 新请求置顶
            }
            taskEl.innerHTML = html;
            
            // --- 5. 关键：重新渲染新插入的图标 ---
            lucide.createIcons();
        }


        // 页面启动时运行
        initMonitor();


        let currentChatId = null;
        let chatHistory = JSON.parse(localStorage.getItem('metalhub_history') || '{}');


        // --- 5. 补充：模型列表加载函数 ---
        async function loadModelList() {
            const select = document.getElementById('model-select');
            const modelMetric = document.getElementById('metric-model');
            
            try {
                const res = await fetch('/v1/models');
                const data = await res.json();
                
                if (!data.data || data.data.length === 0) {
                    select.innerHTML = '<option value="">未找到 GGUF 模型</option>';
                    modelMetric.innerText = "None";
                    return;
                }

                select.innerHTML = ''; // 清空加载中提示
                data.data.forEach((m, index) => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = m.id;
                    // 自动选中第一个，或者根据关键词匹配
                    if (index === 0) opt.selected = true;
                    select.appendChild(opt);
                });

                // 初始化顶部显示的已加载模型名
                modelMetric.innerText = select.value;

            } catch (e) {
                console.error("加载模型列表失败:", e);
                select.innerHTML = '<option value="">加载失败</option>';
            }
        }

        // 确保在页面加载和点击“新对话”时都调用它
        window.addEventListener('DOMContentLoaded', loadModelList);

        // 当用户手动切换下拉框时，同步更新顶部状态
        document.getElementById('model-select').addEventListener('change', (e) => {
            document.getElementById('metric-model').innerText = e.target.value;
        });

        // --- 2. 会话管理逻辑 ---
        function saveHistory() {
            localStorage.setItem('metalhub_history', JSON.stringify(chatHistory));
            renderHistoryList();
        }

        function createNewChat() {
            currentChatId = 'chat-' + Date.now();
            chatHistory[currentChatId] = { title: "新对话", messages: [], timestamp: Date.now() };
            document.getElementById('chat').innerHTML = `
                <div class="text-center mt-20 opacity-20">
                    <i data-lucide="bot" class="h-16 w-16 mx-auto mb-4"></i>
                    <p class="text-xl font-black italic text-blue-400">METALHUB ENGINE</p>
                    <p class="text-sm">M1 Max 64GB Unified Memory Relay</p>
                </div>`;
            lucide.createIcons();
            saveHistory();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const sortedIds = Object.keys(chatHistory).sort((a, b) => chatHistory[b].timestamp - chatHistory[a].timestamp);
            sortedIds.forEach(id => {
                const item = chatHistory[id];
                const div = document.createElement('div');
                div.className = `history-item p-3 rounded-xl text-xs flex items-center justify-between group ${id === currentChatId ? 'active' : 'text-slate-400'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 truncate flex-1" onclick="loadChat('${id}')">
                        <i data-lucide="message-square" class="h-3 w-3 shrink-0"></i>
                        <span class="truncate">${item.title}</span>
                    </div>
                    <i data-lucide="trash-2" class="h-3 w-3 opacity-0 group-hover:opacity-100 hover:text-red-400 transition cursor-pointer" onclick="deleteChat('${id}', event)"></i>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        }

        function deleteChat(id, event) {
            // 阻止事件冒泡，防止触发加载会话
            event.stopPropagation();
            
            // 获取会话标题用于提示
            const title = chatHistory[id].title || "这段对话";
            
            // 商业级标准：二次确认弹窗
            if (confirm(`确定要永久删除 "${title}" 吗？此操作无法撤销。`)) {
                // 执行删除
                delete chatHistory[id];
                
                // 如果删除的是当前正在看的会话，则创建一个新会话
                if (currentChatId === id) {
                    createNewChat();
                } else {
                    // 否则只刷新列表
                    saveHistory();
                }
                
                // 可选：添加一个简单的提示（非阻塞）
                console.log(`会话 ${id} 已删除`);
            }
        }

        function loadChat(id) {
            currentChatId = id;
            const chatBox = document.getElementById('chat');
            chatBox.innerHTML = ''; // 彻底清空，防止叠加渲染
            
            const messages = chatHistory[id].messages;
            messages.forEach(msg => {
                if (msg.role === 'user') {
                    renderUserBubble(msg.content, false); // 传入 false 表示加载历史，不触发滚动和保存
                } else {
                    renderAIBubble(msg.content, msg.stats, false);
                }
            });
            chatBox.scrollTop = chatBox.scrollHeight;
            renderHistoryList();
        }


        function toggleThought(logId) {
            const log = document.getElementById(logId);
            const btn = document.getElementById(logId + '-btn');
            if (log.style.display === 'none') {
                log.style.display = 'block';
                btn.innerText = "收缩日志";
            } else {
                log.style.display = 'none';
                btn.innerText = "展开日志";
            }
        }

        // --- 3. UI 渲染辅助函数 ---
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (Math.min(textarea.scrollHeight, 200)) + 'px';
        }

        // 统一折叠切换函数
        function toggleExpand(id) {
            const full = document.getElementById(id + '-full');
            const short = document.getElementById(id + '-short');
            const btn = document.getElementById(id + '-btn');
            const isHidden = full.classList.contains('hidden');
            full.classList.toggle('hidden');
            short.classList.toggle('hidden');
            btn.innerText = isHidden ? "收缩内容" : "展开全部";
        }

        // 渲染用户气泡 (恢复折叠功能 + 增加复制)
        function renderUserBubble(content) {
            const chat = document.getElementById('chat');
            const msgId = 'user-' + Date.now() + Math.random().toString(36).substr(2, 5);
            const isLong = content.length > 200;
            const display = isLong ? content.substring(0, 200) + "..." : content;
            
            let html = `
                <div class="flex justify-end mb-6 group">
                    <div class="bg-blue-600/10 border border-blue-500/20 px-4 py-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm text-slate-300 shadow-lg relative">
                        <!-- 复制按钮 -->
                        <button onclick="copyTo(\`${content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)" 
                            class="absolute -left-10 top-0 opacity-0 group-hover:opacity-100 transition text-slate-500 hover:text-blue-400 p-2">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <div id="${msgId}-short" class="whitespace-pre-wrap">${display}</div>`;
            
            if (isLong) {
                html += `
                        <div id="${msgId}-full" class="hidden mt-2 pt-2 border-t border-slate-700/50 whitespace-pre-wrap">${content}</div>
                        <button onclick="toggleExpand('${msgId}')" class="text-[10px] text-blue-400 mt-1 hover:text-blue-300 font-bold font-mono uppercase">
                            [ <span id="${msgId}-btn">展开全部</span> ]
                        </button>`;
            }
            
            html += `</div></div>`;
            chat.insertAdjacentHTML('beforeend', html);
            lucide.createIcons();
        }

        // 渲染 AI 气泡 (增加复制 + 申明 + 代码块优化)
        function renderAIBubble(content, stats = null) {
            const chat = document.getElementById('chat');
            const msgId = 'ai-' + Date.now();
            const statsHtml = stats ? `<div class="mt-4 pt-2 border-t border-slate-800 text-[9px] text-slate-500 italic font-mono uppercase tracking-tighter">>> ${stats}</div>` : '';
            
            marked.setOptions({ breaks: true, gfm: true });

            const html = `
                <div class="flex justify-start mb-6 group">
                    <div class="bg-slate-900 border border-slate-800 px-5 py-4 rounded-2xl rounded-tl-none max-w-[90%] text-sm shadow-2xl text-slate-200 leading-relaxed markdown-body relative">
                        <!-- 全文复制 -->
                        <button onclick="copyTo(\`${content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)" 
                            class="absolute -right-10 top-0 opacity-0 group-hover:opacity-100 transition text-slate-500 hover:text-emerald-400 p-2">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <div id="${msgId}-body">${marked.parse(content)}</div>
                        ${statsHtml}
                    </div>
                </div>`;
            chat.insertAdjacentHTML('beforeend', html);
            
            // 专门为代码块加复制和警告
            const body = document.getElementById(`${msgId}-body`);
            body.querySelectorAll('pre').forEach(pre => {
                const code = pre.innerText;
                pre.style.position = 'relative';
                pre.insertAdjacentHTML('beforeend', `<button onclick="copyTo(\`${code.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, this)" class="copy-btn">复制代码</button>`);
                const warn = document.createElement('div');
                warn.className = 'code-warning';
                warn.innerText = '注意：请谨慎使用以上代码。';
                pre.after(warn);
            });
            lucide.createIcons();
        }



        // --- 4. 核心发送逻辑 ---
        async function send(type) {
            const input = document.getElementById('input');
            const val = input.value.trim();
            if (!val) return;

            const selectedModel = document.getElementById('model-select').value;
            const statusText = document.getElementById('status-text');

            // 初始标题与历史保存
            if (chatHistory[currentChatId].messages.length === 0) {
                chatHistory[currentChatId].title = val.substring(0, 15);
            }
            chatHistory[currentChatId].messages.push({role: 'user', content: val});
            
            // UI 清理与渲染用户气泡
            if(document.getElementById('chat').innerText.includes("ENGINE")) document.getElementById('chat').innerHTML = "";
            renderUserBubble(val);
            input.value = "";
            autoResize(input);
            statusText.innerText = type === 'chat' ? "INFERENCING" : "GENERATING";

            try {
                if (type === 'chat') {
                    const res = await fetch('/v1/chat/completions', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ messages: [{role: "user", content: val}], stream: true, model: selectedModel })
                    });

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    const aiMsgId = 'ai-stream-' + Date.now();
                    
                    // 插入 AI 思考/内容气泡
                    // 初始插入：外壳 + 思考框(带折叠) + 内容区
                    document.getElementById('chat').insertAdjacentHTML('beforeend', `
                        <div class="flex justify-start mb-6">
                            <div id="${aiMsgId}" class="bg-slate-900 border border-slate-800 px-5 py-4 rounded-2xl rounded-tl-none max-w-[90%] text-sm shadow-2xl">
                                <!-- 思考区域 -->
                                <div id="${aiMsgId}-thought-container" class="mb-3">
                                    <div class="flex items-center justify-between bg-slate-800/50 px-3 py-1.5 rounded-lg border border-slate-700">
                                        <div class="flex items-center gap-2 text-[10px] text-blue-400 font-bold uppercase tracking-tighter">
                                            <i data-lucide="brain-circuit" class="h-3 w-3 animate-pulse"></i>
                                            <span id="${aiMsgId}-status">MetalHub Thinking...</span>
                                        </div>
                                        <button onclick="toggleThought('${aiMsgId}-log')" class="text-[10px] text-slate-500 hover:text-blue-300">
                                            [ <span id="${aiMsgId}-log-btn">收缩日志</span> ]
                                        </button>
                                    </div>
                                    <div id="${aiMsgId}-log" class="mt-2 text-[10px] text-slate-500 font-mono bg-black/20 p-2 rounded overflow-y-auto max-h-32 transition-all">
                                        <!-- 思考日志实时流 -->
                                    </div>
                                </div>
                                <!-- 正文区域 -->
                                <div id="${aiMsgId}-content" class="text-slate-200 leading-relaxed min-h-[1em]"></div>
                            </div>
                        </div>`);
                    lucide.createIcons();
                    const contentDiv = document.getElementById(aiMsgId + "-content");
                    const thoughtContainer = document.getElementById(aiMsgId + "-thought-container");
                    const logDiv = document.getElementById(aiMsgId + "-log");
                    const statusSpan = document.getElementById(aiMsgId + "-status");


                    let fullContent = "";
                    let finalStats = "";

                    let isThinking = true;

                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;
                        
                        const lines = decoder.decode(value).split('\n');
                        for (const line of lines) {
                            if (!line.trim() || line === 'data: [DONE]') continue;
                            
                            // 【关键修复】确保每一行都定义 data
                            try {
                                const data = JSON.parse(line.replace('data: ', ''));
                                
                                // 1. 处理后端发送的控制/指标包
                                if (data.extra) {
                                    const ex = data.extra;
                                    // 将状态更新写入思考日志
                                    if (ex.status === 'LOADING_MODEL') {
                                        logDiv.innerHTML += `> 加载模型: ${ex.active_model || 'GGUF'}<br>`;
                                    }
                                    if (ex.status === 'PROCESSING_PROMPT') {
                                        statusSpan.innerText = "正在加速预处理...";
                                        logDiv.innerHTML += `> 预处理 Context: ${ex.n_ctx} tokens...<br>`;
                                        logDiv.innerHTML += `> 耗时: ${ex.processing_ms}ms<br>`;
                                    }
                                    
                                    // 指标实时同步到 Header
                                    if (ex.tps) document.getElementById('metric-tps').innerText = ex.tps + ' t/s';
                                    if (ex.processing_ms) document.getElementById('metric-pp').innerText = ex.processing_ms + ' ms';
                                    
                                    // 收到结束包，打印统计
                                    if (ex.status === 'DONE') {
                                        contentDiv.insertAdjacentHTML('beforeend', `
                                            <div class="mt-4 pt-2 border-t border-slate-800 text-[9px] text-slate-500 italic font-mono uppercase tracking-tighter">
                                                >> STATS: ${ex.total_tokens} tokens | ${ex.gen_time}s | ${ex.tps} t/s
                                            </div>`);
                                    }
                                }

                                // 2. 处理内容包
                                if (data.choices && data.choices[0].delta.content) {
                                    // --- 关键点：首次收到内容，清除思考框 ---
                                    if (isThinking) {
                                        thoughtContainer.remove(); // 彻底移除思考气泡
                                        isThinking = false;
                                    }
                                    
                                    const chunk = data.choices[0].delta.content;
                                    fullContent += chunk;
                                    
                                    // 流式期间：显示文本内容（换行处理）
                                    contentDiv.innerHTML = fullContent.replace(/\n/g, '<br>');
                                    chat.scrollTop = chat.scrollHeight;
                                }

                                // 收到 DONE 信号时，进行全量 Markdown 渲染
                                if (data.extra && data.extra.status === 'DONE') {
                                    // 使用 marked 渲染最终结果
                                    contentDiv.innerHTML = marked.parse(fullContent);
                                    contentDiv.classList.add('markdown-body');
                                    
                                    // 存入历史
                                    chatHistory[currentChatId].messages.push({
                                        role: 'assistant', 
                                        content: fullContent, 
                                        stats: `STATS: ${data.extra.total_tokens} tokens | ${data.extra.gen_time}s`
                                    });
                                    saveHistory();
                                }

                            } catch (e) { console.error("解析错误:", e); }
                        }
                        
                    }
                    // 循环结束后执行：
                    if (type === 'chat') {
                        // 检查最后一条消息是否已经是 AI，防止重复添加
                        const lastMsg = chatHistory[currentChatId].messages.slice(-1)[0];
                        if (lastMsg && lastMsg.role !== 'assistant') {
                            chatHistory[currentChatId].messages.push({
                                role: 'assistant', 
                                content: fullContent, 
                                stats: finalStats 
                            });
                        }
                        saveHistory();
                    }


                } else {
                    // 生图逻辑
                    const res = await fetch('/v1/images/generations', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ prompt: val })
                    });
                    const imgData = await res.json();
                    const imgUrl = imgData.data[0].url;
                    document.getElementById('chat').insertAdjacentHTML('beforeend', `<div class="flex justify-start mb-6"><div class="bg-slate-900 border border-slate-800 p-2 rounded-2xl shadow-2xl"><img src="${imgUrl}" class="rounded-xl max-w-full md:max-w-md border border-slate-700"></div></div>`);
                    chatHistory[currentChatId].messages.push({role: 'assistant', content: `<img src="${imgUrl}">`});
                    saveHistory();
                }
            } catch (err) {
                document.getElementById('chat').insertAdjacentHTML('beforeend', `<div class="text-red-500 text-xs p-4 italic">Error: ${err.message}</div>`);
            } finally {
                statusText.innerText = "Ready";
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            }
        }

        // 页面加载初始化
        if (Object.keys(chatHistory).length === 0) createNewChat();
        else {
            const lastId = Object.keys(chatHistory).sort((a, b) => chatHistory[b].timestamp - chatHistory[a].timestamp)[0];
            loadChat(lastId);
        }


    </script>
</body>
</html>
